services:
  api:
    build: ./backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped

  worker:
    build: ./backend
    command: celery -A app.worker worker --loglevel=info --concurrency=2
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata: